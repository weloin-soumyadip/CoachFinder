name: coachfinder
description: "CoachFinder — discover and contact coaching centers near you."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0-0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.5.1
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5

  go_router: ^13.2.0

  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  dio: ^5.4.3+1
  flutter_secure_storage: ^9.2.2

  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  hive_generator: ^2.0.1
  json_serializable: ^6.8.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
